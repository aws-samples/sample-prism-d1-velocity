# PRISM D1 Velocity — GitLab CI/CD Pipeline
#
# Copy this file to .gitlab-ci.yml in your repo root.
# Individual workflow files should be placed in .prism/gitlab-workflows/
#
# Required setup:
#   1. Run: prism-cli bootstrapper setup-gitlab-oidc
#   2. Add CI/CD variable PRISM_METRICS_ROLE_ARN with the output role ARN
#   3. Copy gitlab-workflows/*.yml to .prism/gitlab-workflows/ in your repo
#   4. (Optional) Set GITLAB_OIDC_AUDIENCE if not using gitlab.aws.dev
#   5. (Optional) Create a pipeline schedule for prism-dora-weekly (Monday 09:00 UTC)

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'

default:
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com

include:
  - local: '.prism/gitlab-workflows/prism-ai-metrics.yml'
  - local: '.prism/gitlab-workflows/prism-dora-weekly.yml'
  - local: '.prism/gitlab-workflows/prism-agent-eval.yml'
  - local: '.prism/gitlab-workflows/prism-eval-gate.yml'
